un Vijayvergiya", "Chelsea Voss", "Carroll L. Wainwright", "Justin Wang", "Alvin Wang", "Ben Wang", "Jonathan Ward", "Jason Wei", "CJ Weinmann", "Akila Welihinda", "Peter Welinder", "Jiayi Weng", "Lilian Weng", "Matt Wiethoff", "Dave Willner", "Clemens Winter", "Samuel Wolrich", "Hannah Wong", "Lauren Workman", "Sherwin Wu", "Jeff Wu", "Michael Wu", "Kai Xiao", "Tao Xu", "Sarah Yoo", "Kevin Yu", "Qim-ing Yuan", "Wojciech Zaremba", "Rowan Zellers", "Chong Zhang", "Marvin Zhang", "Shengjia Zhao", "Tianhao Zheng", "Juntang Zhuang", "William Zhuk", "Barret Zoph"]
    date: "2023-03-15"
    abstract: >-
      We report the development of GPT-4, a large-scale, multimodal model
      which can accept image and text inputs and produce text outputs. While
      less capable than humans in many real-world scenarios, GPT-4 exhibits
      human-level performance on various professional and academic benchmarks,
      including passing a simulated bar exam with a score around the top 10%
      of test takers. GPT-4 is a Transformer-based model pre-trained to
      predict the next token in a document. The post-training alignment
      process results in improved performance on measures of factuality and
      adherence to desired behavior. A core component of this project was
      developing infrastructure and optimization methods that behave
      predictably across a wide range of scales. This allowed us to accurately
      predict some aspects of GPT-4's performance based on models trained with
      no more than 1/1,000th the compute of GPT-4.
  - arxiv_id: "2307.03172"
    title: "Lost in the Middle: How Language Models Use Long Contexts"
    category: capabilities
    authors: ["Nelson F. Liu", "Kevin Lin", "John Hewitt", "Ashwin Paranjape", "Michele Bevilacqua", "F. Petroni", "Percy Liang"]
    date: "2023-07-06"
    abstract: >-
      While recent language models have the ability to take long contexts as
      input, relatively little is known about how well they use longer
      context. We analyze the performance of language models on two tasks that
      require identifying relevant information in their input contexts:
      multi-document question answering and key-value retrieval. We find that
      performance can degrade significantly when changing the position of
      relevant information, indicating that current language models do not
      robustly make use of information in long input contexts. In particular,
      we observe that performance is often highest when relevant information
      occurs at the beginning or end of the input context, and significantly
      degrades when models must access relevant information in the middle of
      long contexts, even for explicitly long-context models. Our analysis
      provides a better understanding of how language models use their input
      context and provides new evaluation protocols for future long-context
      language models.
  - arxiv_id: "2304.15004"
    title: "Are Emergent Abilities of Large Language Models a Mirage?"
    category: capabilities
    authors: ["Rylan Schaeffer", "B. Miranda", "Oluwasanmi Koyejo"]
    date: "None"
    abstract: >-
      Recent work claims that large language models display emergent
      abilities, abilities not present in smaller-scale models that are
      present in larger-scale models. What makes emergent abilities intriguing
      is two-fold: their sharpness, transitioning seemingly instantaneously
      from not present to present, and their unpredictability, appearing at
      seemingly unforeseeable model scales. Here, we present an alternative
      explanation for emergent abilities: that for a particular task and model
      family, when analyzing fixed model outputs, emergent abilities appear
      due to the researcher's choice of metric rather than due to fundamental
      changes in model behavior with scale. Specifically, nonlinear or
      discontinuous metrics produce apparent emergent abilities, whereas
      linear or continuous metrics produce smooth, continuous predictable
      changes in model performance. We present our alternative explanation in
      a simple mathematical model, then test it in three complementary ways:
      we (1) make, test and confirm three predictions on the effect of metric
      choice using the InstructGPT/GPT-3 family on tasks with claimed emergent
      abilities; (2) make, test and confirm two predictions about metric
      choices in a meta-analysis of emergent abilities on BIG-Bench; and (3)
      show to choose metrics to produce never-before-seen seemingly emergent
      abilities in multiple vision tasks across diverse deep networks. Via all
      three analyses, we provide evidence that alleged emergent abilities
      evaporate with different metrics or with better statistics, and may not
      be a fundamental property of scaling AI models.
  - arxiv_id: "2210.03629"
    title: "ReAct: Synergizing Reasoning and Acting in Language Models"
    category: agentic
    authors: ["Shunyu Yao", "Jeffrey Zhao", "Dian Yu", "Nan Du", "Izhak Shafran", "Karthik Narasimhan", "Yuan Cao"]
    date: "2022-10-06"
    abstract: >-
      While large language models (LLMs) have demonstrated impressive
      capabilities across tasks in language understanding and interactive
      decision making, their abilities for reasoning (e.g. chain-of-thought
      prompting) and acting (e.g. action plan generation) have primarily been
      studied as separate topics. In this paper, we explore the use of LLMs to
      generate both reasoning traces and task-specific actions in an
      interleaved manner, allowing for greater synergy between the two:
      reasoning traces help the model induce, track, and update action plans
      as well as handle exceptions, while actions allow it to interface with
      external sources, such as knowledge bases or environments, to gather
      additional information. We apply our approach, named ReAct, to a diverse
      set of language and decision making tasks and demonstrate its
      effectiveness over state-of-the-art baselines, as well as improved human
      interpretability and trustworthiness over methods without reasoning or
      acting components. Concretely, on question answering (HotpotQA) and fact
      verification (Fever), ReAct overcomes issues of hallucination and error
      propagation prevalent in chain-of-thought reasoning by interacting with
      a simple Wikipedia API, and generates human-like task-solving
      trajectories that are more interpretable than baselines without
      reasoning traces. On two interactive decision making benchmarks
      (ALFWorld and WebShop), ReAct outperforms imitation and reinforcement
      learning methods by an absolute success rate of 34% and 10%
      respectively, while being prompted with only one or two in-context
      examples. Project site with code: https://react-lm.github.io
  - arxiv_id: "2303.11366"
    title: "Reflexion: language agents with verbal reinforcement learning"
    category: agentic
    authors: ["Noah Shinn", "Federico Cassano", "Beck Labash", "A. Gopinath", "Karthik Narasimhan", "Shunyu Yao"]
    date: "2023-03-20"
    abstract: >-
      Large language models (LLMs) have been increasingly used to interact
      with external environments (e.g., games, compilers, APIs) as goal-driven
      agents. However, it remains challenging for these language agents to
      quickly and efficiently learn from trial-and-error as traditional
      reinforcement learning methods require extensive training samples and
      expensive model fine-tuning. We propose Reflexion, a novel framework to
      reinforce language agents not by updating weights, but instead through
      linguistic feedback. Concretely, Reflexion agents verbally reflect on
      task feedback signals, then maintain their own reflective text in an
      episodic memory buffer to induce better decision-making in subsequent
      trials. Reflexion is flexible enough to incorporate various types
      (scalar values or free-form language) and sources (external or
      internally simulated) of feedback signals, and obtains significant
      improvements over a baseline agent across diverse tasks (sequential
      decision-making, coding, language reasoning). For example, Reflexion
      achieves a 91% pass@1 accuracy on the HumanEval coding benchmark,
      surpassing the previous state-of-the-art GPT-4 that achieves 80%. We
      also conduct ablation and analysis studies using different feedback
      signals, feedback incorporation methods, and agent types, and provide
      insights into how they affect performance.
  - arxiv_id: "2308.00352"
    title: "MetaGPT: Meta Programming for Multi-Agent Collaborative Framework"
    category: agentic
    authors: ["Sirui Hong", "Xiawu Zheng", "Jonathan P. Chen", "Yuheng Cheng", "Ceyao Zhang", "Zili Wang", "Steven Ka Shing Yau", "Z. Lin", "Liyang Zhou", "Chenyu Ran", "Lingfeng Xiao", "Chenglin Wu"]
    date: "2023-08-01"
    abstract: >-
      Recently, remarkable progress has been made in automated task-solving
      through the use of multi-agent driven by large language models (LLMs).
      However, existing LLM-based multi-agent works primarily focus on solving
      simple dialogue tasks, and complex tasks are rarely studied, mainly due
      to the LLM hallucination problem. This type of hallucination becomes
      cascading when naively chaining multiple intelligent agents, resulting
      in a failure to effectively address complex problems. Therefore, we
      introduce MetaGPT, an innovative framework that incorporates efficient
      human workflows as a meta programming approach into LLM-based
      multi-agent collaboration. Specifically, MetaGPT encodes Standardized
      Operating Procedures (SOPs) into prompts to enhance structured
      coordination. Subsequently, it mandates modular outputs, empowering
      agents with domain expertise comparable to human professionals, to
      validate outputs and minimize compounded errors. In this way, MetaGPT
      leverages the assembly line paradigm to assign diverse roles to various
      agents, thereby establishing a framework that can effectively and
      cohesively deconstruct complex multi-agent collaborative problems. Our
      experiments on collaborative software engineering benchmarks demonstrate
      that MetaGPT generates more coherent and correct solutions compared to
      existing chat-based multi-agent systems. This highlights the potential
      of integrating human domain knowledge into multi-agent systems, thereby
      creating new opportunities to tackle complex real-world challenges. The
      GitHub repository of this project is publicly available
      on:https://github.com/geekan/MetaGPT.
  - arxiv_id: "2308.08155"
    title: "AutoGen: Enabling Next-Gen LLM Applications via Multi-Agent Conversation"
    category: agentic
    authors: ["Qingyun Wu", "Gagan Bansal", "Jieyu Zhang", "Yiran Wu", "Beibin Li", "E. Zhu", "Li Jiang", "Xiaoyun Zhang", "Shaokun Zhang", "Jiale Liu", "A. Awadallah", "Ryen W. White", "Doug Burger", "Chi Wang"]
    date: "2023-08-16"
    abstract: >-
      AutoGen is an open-source framework that allows developers to build LLM
      applications via multiple agents that can converse with each other to
      accomplish tasks. AutoGen agents are customizable, conversable, and can
      operate in various modes that employ combinations of LLMs, human inputs,
      and tools. Using AutoGen, developers can also flexibly define agent
      interaction behaviors. Both natural language and computer code can be
      used to program flexible conversation patterns for different
      applications. AutoGen serves as a generic infrastructure to build
      diverse applications of various complexities and LLM capacities.
      Empirical studies demonstrate the effectiveness of the framework in many
      example applications, with domains ranging from mathematics, coding,
      question answering, operations research, online decision-making,
      entertainment, etc.
  - arxiv_id: "2310.04406"
    title: "Language Agent Tree Search Unifies Reasoning Acting and Planning in Language Models"
    category: agentic
    authors: ["Andy Zhou", "Kai Yan", "Michal Shlapentokh-Rothman", "Haohan Wang", "Yu-Xiong Wang"]
    date: "2023-10-06"
    abstract: >-
      While language models (LMs) have shown potential across a range of
      decision-making tasks, their reliance on simple acting processes limits
      their broad deployment as autonomous agents. In this paper, we introduce
      Language Agent Tree Search (LATS) -- the first general framework that
      synergizes the capabilities of LMs in reasoning, acting, and planning.
      By leveraging the in-context learning ability of LMs, we integrate Monte
      Carlo Tree Search into LATS to enable LMs as agents, along with
      LM-powered value functions and self-reflections for proficient
      exploration and enhanced decision-making. A key feature of our approach
      is the incorporation of an environment for external feedback, which
      offers a more deliberate and adaptive problem-solving mechanism that
      surpasses the constraints of existing techniques. Our experimental
      evaluation across diverse domains, including programming, interactive
      question-answering (QA), web navigation, and math, validates the
      effectiveness and generality of LATS in decision-making while
      maintaining competitive or improved reasoning performance. Notably, LATS
      achieves state-of-the-art pass@1 accuracy (92.7%) for programming on
      HumanEval with GPT-4 and demonstrates gradient-free performance (average
      score of 75.9) comparable to gradient-based fine-tuning for web
      navigation on WebShop with GPT-3.5. Code can be found at
      https://github.com/lapisrocks/LanguageAgentTreeSearch
  - arxiv_id: "2305.16291"
    title: "Voyager: An Open-Ended Embodied Agent with Large Language Models"
    category: agentic
    authors: ["Guanzhi Wang", "Yuqi Xie", "Yunfan Jiang", "A. Mandlekar", "Chaowei Xiao", "Yuke Zhu", "Linxi (Jim) Fan", "Anima Anandkumar"]
    date: "2023-05-25"
    abstract: >-
      We introduce Voyager, the first LLM-powered embodied lifelong learning
      agent in Minecraft that continuously explores the world, acquires
      diverse skills, and makes novel discoveries without human intervention.
      Voyager consists of three key components: 1) an automatic curriculum
      that maximizes exploration, 2) an ever-growing skill library of
      executable code for storing and retrieving complex behaviors, and 3) a
      new iterative prompting mechanism that incorporates environment
      feedback, execution errors, and self-verification for program
      improvement. Voyager interacts with GPT-4 via blackbox queries, which
      bypasses the need for model parameter fine-tuning. The skills developed
      by Voyager are temporally extended, interpretable, and compositional,
      which compounds the agent's abilities rapidly and alleviates
      catastrophic forgetting. Empirically, Voyager shows strong in-context
      lifelong learning capability and exhibits exceptional proficiency in
      playing Minecraft. It obtains 3.3x more unique items, travels 2.3x
      longer distances, and unlocks key tech tree milestones up to 15.3x
      faster than prior SOTA. Voyager is able to utilize the learned skill
      library in a new Minecraft world to solve novel tasks from scratch,
      while other techniques struggle to generalize. We open-source our full
      codebase and prompts at https://voyager.minedojo.org/.
  - arxiv_id: "2305.17126"
    title: "Large Language Models as Tool Makers"
    category: agentic
    authors: ["Tianle Cai", "Xuezhi Wang", "Tengyu Ma", "Xinyun Chen", "Denny Zhou"]
    date: "2023-05-26"
    abstract: >-
      Recent research has highlighted the potential of large language models
      (LLMs) to improve their problem-solving capabilities with the aid of
      suitable external tools. In our work, we further advance this concept by
      introducing a closed-loop framework, referred to as LLMs A s Tool Makers
      (LATM), where LLMs create their own reusable tools for problem-solving.
      Our approach consists of two phases: 1) tool making: an LLM acts as the
      tool maker that crafts tools for a set of tasks. 2) tool using: another
      LLM acts as the tool user, which applies the tool built by the tool
      maker for problem-solving. On the problem-solving server side,
      tool-making enables continual tool generation and caching as new
      requests emerge. This framework enables subsequent requests to access
      cached tools via their corresponding APIs, enhancing the efficiency of
      task resolution. Recognizing that tool-making requires more
      sophisticated capabilities, we assign this task to a powerful, albeit
      resource-intensive, model. Conversely, the simpler tool-using phase is
      delegated to a lightweight model. This strategic division of labor
      allows the once-off cost of tool-making to be spread over multiple
      instances of tool-using, significantly reducing average costs while
      maintaining strong performance. Furthermore, our method offers a
      functional cache through the caching and reuse of tools, which stores
      the functionality of a class of requests instead of the natural language
      responses from LLMs, thus extending the applicability of the
      conventional cache mechanism. We evaluate our approach across various
      complex reasoning tasks, including Big-Bench tasks. With GPT-4 as the
      tool maker and GPT-3.5 as the tool user, LATM demonstrates performance
      equivalent to using GPT-4 for both roles, but with a significantly
      reduced inference cost.
  - arxiv_id: "2402.05120"
    title: "More Agents Is All You Need"
    category: agentic
    authors: ["Junyou Li", "Qin Zhang", "Yangbin Yu", "Qiang Fu", "Deheng Ye"]
    date: "2024-02-03"
    abstract: >-
      We find that, simply via a sampling-and-voting method, the performance
      of large language models (LLMs) scales with the number of agents
      instantiated. Also, this method, termed as Agent Forest, is orthogonal
      to existing complicated methods to further enhance LLMs, while the
      degree of enhancement is correlated to the task difficulty. We conduct
      comprehensive experiments on a wide range of LLM benchmarks to verify
      the presence of our finding, and to study the properties that can
      facilitate its occurrence. Our code is publicly available at:
      https://github.com/MoreAgentsIsAllYouNeed/AgentForest
  - arxiv_id: "2209.07858"
    title: "Red Teaming Language Models to Reduce Harms: Methods, Scaling Behaviors, and Lessons Learned"
    category: safety
    authors: ["Deep Ganguli", "Liane Lovitt", "John Kernion", "Amanda Askell", "Yuntao Bai", "Saurav Kadavath", "Benjamin Mann", "Ethan Perez", "Nicholas Schiefer", "Kamal Ndousse", "Andy Jones", "Sam Bowman", "Anna Chen", "Tom Conerly", "Nova Dassarma", "Dawn Drain", "Nelson Elhage", "S. El-Showk", "Stanislav Fort", "Z. Dodds", "T. Henighan", "Danny Hernandez", "Tristan Hume", "Josh Jacobson", "Scott Johnston", "Shauna Kravec", "Catherine Olsson", "Sam Ringer", "Eli Tran-Johnson", "Dario Amodei", "Tom B. Brown", "Nicholas Joseph", "Sam McCandlish", "Chris Olah", "Jared Kaplan", "Jack Clark"]
    date: "2022-08-23"
    abstract: >-
      We describe our early efforts to red team language models in order to
      simultaneously discover, measure, and attempt to reduce their
      potentially harmful outputs. We make three main contributions. First, we
      investigate scaling behaviors for red teaming across 3 model sizes
      (2.7B, 13B, and 52B parameters) and 4 model types: a plain language
      model (LM); an LM prompted to be helpful, honest, and harmless; an LM
      with rejection sampling; and a model trained to be helpful and harmless
      using reinforcement learning from human feedback (RLHF). We find that
      the RLHF models are increasingly difficult to red team as they scale,
      and we find a flat trend with scale for the other model types. Second,
      we release our dataset of 38,961 red team attacks for others to analyze
      and learn from. We provide our own analysis of the data and find a
      variety of harmful outputs, which range from offensive language to more
      subtly harmful non-violent unethical outputs. Third, we exhaustively
      describe our instructions, processes, statistical methodologies, and
      uncertainty about red teaming. We hope that this transparency
      accelerates our ability to work together as a community in order to
      develop shared norms, practices, and technical standards for how to red
      team language models.
  - arxiv_id: "2310.01405"
    title: "Representation Engineering: A Top-Down Approach to AI Transparency"
    category: safety
    authors: ["Andy Zou", "Long Phan", "Sarah Chen", "James Campbell", "Phillip Guo", "Richard Ren", "Alexander Pan", "Xuwang Yin", "Mantas Mazeika", "Ann-Kathrin Dombrowski", "Shashwat Goel", "Nathaniel Li", "Michael J. Byun", "Zifan Wang", "Alex Troy Mallen", "Steven Basart", "Sanmi Koyejo", "Dawn Song", "Matt Fredrikson", "Zico Kolter", "Dan Hendrycks"]
    date: "2023-10-02"
    abstract: >-
      In this paper, we identify and characterize the emerging area of
      representation engineering (RepE), an approach to enhancing the
      transparency of AI systems that draws on insights from cognitive
      neuroscience. RepE places population-level representations, rather than
      neurons or circuits, at the center of analysis, equipping us with novel
      methods for monitoring and manipulating high-level cognitive phenomena
      in deep neural networks (DNNs). We provide baselines and an initial
      analysis of RepE techniques, showing that they offer simple yet
      effective solutions for improving our understanding and control of large
      language models. We showcase how these methods can provide traction on a
      wide range of safety-relevant problems, including honesty, harmlessness,
      power-seeking, and more, demonstrating the promise of top-down
      transparency research. We hope that this work catalyzes further
      exploration of RepE and fosters advancements in the transparency and
      safety of AI systems.
  - arxiv_id: "2306.05685"
    title: "Judging LLM-as-a-judge with MT-Bench and Chatbot Arena"
    category: safety
    authors: ["Lianmin Zheng", "Wei-Lin Chiang", "Ying Sheng", "Siyuan Zhuang", "Zhanghao Wu", "Yonghao Zhuang", "Zi Lin", "Zhuohan Li", "Dacheng Li", "E. Xing", "Haotong Zhang", "Joseph E. Gonzalez", "Ion Stoica"]
    date: "2023-06-09"
    abstract: >-
      Evaluating large language model (LLM) based chat assistants is
      challenging due to their broad capabilities and the inadequacy of
      existing benchmarks in measuring human preferences. To address this, we
      explore using strong LLMs as judges to evaluate these models on more
      open-ended questions. We examine the usage and limitations of
      LLM-as-a-judge, including position, verbosity, and self-enhancement
      biases, as well as limited reasoning ability, and propose solutions to
      mitigate some of them. We then verify the agreement between LLM judges
      and human preferences by introducing two benchmarks: MT-bench, a
      multi-turn question set; and Chatbot Arena, a crowdsourced battle
      platform. Our results reveal that strong LLM judges like GPT-4 can match
      both controlled and crowdsourced human preferences well, achieving over
      80% agreement, the same level of agreement between humans. Hence,
      LLM-as-a-judge is a scalable and explainable way to approximate human
      preferences, which are otherwise very expensive to obtain. Additionally,
      we show our benchmark and traditional benchmarks complement each other
      by evaluating several variants of LLaMA and Vicuna. The MT-bench
      questions, 3K expert votes, and 30K conversations with human preferences
      are publicly available at
      https://github.com/lm-sys/FastChat/tree/main/fastchat/llm_judge.
  - arxiv_id: "2311.12022"
    title: "GPQA: A Graduate-Level Google-Proof Q&A Benchmark"
    category: safety
    authors: ["David Rein", "Betty Li Hou", "Asa Cooper Stickland", "Jackson Petty", "Richard Yuanzhe Pang", "Julien Dirani", "Julian Michael", "Samuel R. Bowman"]
    date: "2023-11-20"
    abstract: >-
      We present GPQA, a challenging dataset of 448 multiple-choice questions
      written by domain experts in biology, physics, and chemistry. We ensure
      that the questions are high-quality and extremely difficult: experts who
      have or are pursuing PhDs in the corresponding domains reach 65%
      accuracy (74% when discounting clear mistakes the experts identified in
      retrospect), while highly skilled non-expert validators only reach 34%
      accuracy, despite spending on average over 30 minutes with unrestricted
      access to the web (i.e., the questions are"Google-proof"). The questions
      are also difficult for state-of-the-art AI systems, with our strongest
      GPT-4 based baseline achieving 39% accuracy. If we are to use future AI
      systems to help us answer very hard questions, for example, when
      developing new scientific knowledge, we need to develop scalable
      oversight methods that enable humans to supervise their outputs, which
      may be difficult even if the supervisors are themselves skilled and
      knowledgeable. The difficulty of GPQA both for skilled non-experts and
      frontier AI systems should enable realistic scalable oversight
      experiments, which we hope can help devise ways for human experts to
      reliably get truthful information from AI systems that surpass human
      capabilities.
  - arxiv_id: "2406.04127"
    title: "The Prompt Report: A Systematic Survey of Prompting Techniques"
    category: safety
    authors: ["Sander Schulhoff", "Michael Ilie", "Nishant Balepur", "Konstantine Kahadze", "Amanda Liu", "Chenxu Shao"]
    date: "2024-06-06"
    abstract: >-
      Generative Artificial Intelligence (GenAI) systems are being
      increasingly deployed across all parts of industry and research
      settings. Developers and end users interact with these systems through
      the use of prompting or prompt engineering. While prompting is a
      widespread activity, there has been limited systematic analysis of the
      prompting techniques available. We establish a taxonomy of 33 vocabulary
      terms used in the prompting literature, a comprehensive taxonomy of 58
      text-only prompting techniques, and 40 techniques for other modalities.
