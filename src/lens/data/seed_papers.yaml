anjun Zhang", "Tim Matthews", "Timothy Chou", "Tzook Shaked", "Varun Vontimitta", "Victoria O Ajayi", "Victoria Montanez", "Vijai Mohan", "Vinay Kumar", "Vishal Mangla", "Vlad Ionescu", "V. Poenaru", "Vlad T. Mihailescu", "V. Ivanov", "Wei Li", "Wenchen Wang"]
    date: "2024-07-31"
    abstract: >-
      Modern artificial intelligence (AI) systems are powered by foundation
      models. This paper presents a new set of foundation models, called Llama
      3. It is a herd of language models that natively support
      multilinguality, coding, reasoning, and tool usage. Our largest model is
      a dense Transformer with 405B parameters and a context window of up to
      128K tokens. This paper presents an extensive empirical evaluation of
      Llama 3. We find that Llama 3 delivers comparable quality to leading
      language models such as GPT-4 on a plethora of tasks. We publicly
      release Llama 3, including pre-trained and post-trained versions of the
      405B parameter language model and our Llama Guard 3 model for input and
      output safety. The paper also presents the results of experiments in
      which we integrate image, video, and speech capabilities into Llama 3
      via a compositional approach. We observe this approach performs
      competitively with the state-of-the-art on image, video, and speech
      recognition tasks. The resulting models are not yet being broadly
      released as they are still under development.
  - arxiv_id: "2305.13245"
    title: "GQA: Training Generalized Multi-Query Transformer Models from Multi-Head Checkpoints"
    category: architecture
    authors: ["J. Ainslie", "J. Lee-Thorp", "Michiel de Jong", "Yury Zemlyanskiy", "Federico Lebr'on", "Sumit K. Sanghai"]
    date: "2023-05-22"
    abstract: >-
      Multi-query attention (MQA), which only uses a single key-value head,
      drastically speeds up decoder inference. However, MQA can lead to
      quality degradation, and moreover it may not be desirable to train a
      separate model just for faster inference. We (1) propose a recipe for
      uptraining existing multi-head language model checkpoints into models
      with MQA using 5% of original pre-training compute, and (2) introduce
      grouped-query attention (GQA), a generalization of multi-query attention
      which uses an intermediate (more than one, less than number of query
      heads) number of key-value heads. We show that uptrained GQA achieves
      quality close to multi-head attention with comparable speed to MQA.
  - arxiv_id: "2104.09864"
    title: "RoFormer: Enhanced Transformer with Rotary Position Embedding"
    category: architecture
    authors: ["Jianlin Su", "Yu Lu", "Shengfeng Pan", "Bo Wen", "Yunfeng Liu"]
    date: "2021-04-20"
    abstract: >-
      Position encoding recently has shown effective in the transformer
      architecture. It enables valuable supervision for dependency modeling
      between elements at different positions of the sequence. In this paper,
      we first investigate various methods to integrate positional information
      into the learning process of transformer-based language models. Then, we
      propose a novel method named Rotary Position Embedding(RoPE) to
      effectively leverage the positional information. Specifically, the
      proposed RoPE encodes the absolute position with a rotation matrix and
      meanwhile incorporates the explicit relative position dependency in
      self-attention formulation. Notably, RoPE enables valuable properties,
      including the flexibility of sequence length, decaying inter-token
      dependency with increasing relative distances, and the capability of
      equipping the linear self-attention with relative position encoding.
      Finally, we evaluate the enhanced transformer with rotary position
      embedding, also called RoFormer, on various long text classification
      benchmark datasets. Our experiments show that it consistently overcomes
      its alternatives. Furthermore, we provide a theoretical analysis to
      explain some experimental results. RoFormer is already integrated into
      Huggingface:
      \url{https://huggingface.co/docs/transformers/model_doc/roformer}.
  - arxiv_id: "2205.14135"
    title: "FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness"
    category: architecture
    authors: ["Tri Dao", "Daniel Y. Fu", "Stefano Ermon", "A. Rudra", "Christopher R'e"]
    date: "2022-05-27"
    abstract: >-
      Transformers are slow and memory-hungry on long sequences, since the
      time and memory complexity of self-attention are quadratic in sequence
      length. Approximate attention methods have attempted to address this
      problem by trading off model quality to reduce the compute complexity,
      but often do not achieve wall-clock speedup. We argue that a missing
      principle is making attention algorithms IO-aware -- accounting for
      reads and writes between levels of GPU memory. We propose
      FlashAttention, an IO-aware exact attention algorithm that uses tiling
      to reduce the number of memory reads/writes between GPU high bandwidth
      memory (HBM) and GPU on-chip SRAM. We analyze the IO complexity of
      FlashAttention, showing that it requires fewer HBM accesses than
      standard attention, and is optimal for a range of SRAM sizes. We also
      extend FlashAttention to block-sparse attention, yielding an approximate
      attention algorithm that is faster than any existing approximate
      attention method. FlashAttention trains Transformers faster than
      existing baselines: 15% end-to-end wall-clock speedup on BERT-large
      (seq. length 512) compared to the MLPerf 1.1 training speed record,
      3$\times$ speedup on GPT-2 (seq. length 1K), and 2.4$\times$ speedup on
      long-range arena (seq. length 1K-4K). FlashAttention and block-sparse
      FlashAttention enable longer context in Transformers, yielding higher
      quality models (0.7 better perplexity on GPT-2 and 6.4 points of lift on
      long-document classification) and entirely new capabilities: the first
      Transformers to achieve better-than-chance performance on the Path-X
      challenge (seq. length 16K, 61.4% accuracy) and Path-256 (seq. length
      64K, 63.1% accuracy).
  - arxiv_id: "2307.08691"
    title: "FlashAttention-2: Faster Attention with Better Parallelism and Work Partitioning"
    category: architecture
    authors: ["Tri Dao"]
    date: "2023-07-17"
    abstract: >-
      Scaling Transformers to longer sequence lengths has been a major problem
      in the last several years, promising to improve performance in language
      modeling and high-resolution image understanding, as well as to unlock
      new applications in code, audio, and video generation. The attention
      layer is the main bottleneck in scaling to longer sequences, as its
      runtime and memory increase quadratically in the sequence length.
      FlashAttention exploits the asymmetric GPU memory hierarchy to bring
      significant memory saving (linear instead of quadratic) and runtime
      speedup (2-4$\times$ compared to optimized baselines), with no
      approximation. However, FlashAttention is still not nearly as fast as
      optimized matrix-multiply (GEMM) operations, reaching only 25-40\% of
      the theoretical maximum FLOPs/s. We observe that the inefficiency is due
      to suboptimal work partitioning between different thread blocks and
      warps on the GPU, causing either low-occupancy or unnecessary shared
      memory reads/writes. We propose FlashAttention-2, with better work
      partitioning to address these issues. In particular, we (1) tweak the
      algorithm to reduce the number of non-matmul FLOPs (2) parallelize the
      attention computation, even for a single head, across different thread
      blocks to increase occupancy, and (3) within each thread block,
      distribute the work between warps to reduce communication through shared
      memory. These yield around 2$\times$ speedup compared to FlashAttention,
      reaching 50-73\% of the theoretical maximum FLOPs/s on A100 and getting
      close to the efficiency of GEMM operations. We empirically validate that
      when used end-to-end to train GPT-style models, FlashAttention-2 reaches
      training speed of up to 225 TFLOPs/s per A100 GPU (72\% model FLOPs
      utilization).
  - arxiv_id: "2309.17453"
    title: "Efficient Streaming Language Models with Attention Sinks"
    category: architecture
    authors: ["Guangxuan Xiao", "Yuandong Tian", "Beidi Chen", "Song Han", "Mike Lewis"]
    date: "2023-09-29"
    abstract: >-
      Deploying Large Language Models (LLMs) in streaming applications such as
      multi-round dialogue, where long interactions are expected, is urgently
      needed but poses two major challenges. Firstly, during the decoding
      stage, caching previous tokens' Key and Value states (KV) consumes
      extensive memory. Secondly, popular LLMs cannot generalize to longer
      texts than the training sequence length. Window attention, where only
      the most recent KVs are cached, is a natural approach -- but we show
      that it fails when the text length surpasses the cache size. We observe
      an interesting phenomenon, namely attention sink, that keeping the KV of
      initial tokens will largely recover the performance of window attention.
      In this paper, we first demonstrate that the emergence of attention sink
      is due to the strong attention scores towards initial tokens as
      a"sink"even if they are not semantically important. Based on the above
      analysis, we introduce StreamingLLM, an efficient framework that enables
      LLMs trained with a finite length attention window to generalize to
      infinite sequence lengths without any fine-tuning. We show that
      StreamingLLM can enable Llama-2, MPT, Falcon, and Pythia to perform
      stable and efficient language modeling with up to 4 million tokens and
      more. In addition, we discover that adding a placeholder token as a
      dedicated attention sink during pre-training can further improve
      streaming deployment. In streaming settings, StreamingLLM outperforms
      the sliding window recomputation baseline by up to 22.2x speedup. Code
      and datasets are provided at
      https://github.com/mit-han-lab/streaming-llm.
  - arxiv_id: "2401.04088"
    title: "Mixtral of Experts"
    category: architecture
    authors: ["Albert Q. Jiang", "Alexandre Sablayrolles", "Antoine Roux", "Arthur Mensch", "Blanche Savary", "Chris Bamford", "Devendra Singh Chaplot", "Diego de Las Casas", "Emma Bou Hanna", "Florian Bressand", "Gianna Lengyel", "Guillaume Bour", "Guillaume Lample", "L\u00e9lio Renard Lavaud", "Lucile Saulnier", "M. Lachaux", "Pierre Stock", "Sandeep Subramanian", "Sophia Yang", "Szymon Antoniak", "Teven Le Scao", "Th\u00e9ophile Gervet", "Thibaut Lavril", "Thomas Wang", "Timoth\u00e9e Lacroix", "William El Sayed"]
    date: "2024-01-08"
    abstract: >-
      We introduce Mixtral 8x7B, a Sparse Mixture of Experts (SMoE) language
      model. Mixtral has the same architecture as Mistral 7B, with the
      difference that each layer is composed of 8 feedforward blocks (i.e.
      experts). For every token, at each layer, a router network selects two
      experts to process the current state and combine their outputs. Even
      though each token only sees two experts, the selected experts can be
      different at each timestep. As a result, each token has access to 47B
      parameters, but only uses 13B active parameters during inference.
      Mixtral was trained with a context size of 32k tokens and it outperforms
      or matches Llama 2 70B and GPT-3.5 across all evaluated benchmarks. In
      particular, Mixtral vastly outperforms Llama 2 70B on mathematics, code
      generation, and multilingual benchmarks. We also provide a model
      fine-tuned to follow instructions, Mixtral 8x7B - Instruct, that
      surpasses GPT-3.5 Turbo, Claude-2.1, Gemini Pro, and Llama 2 70B - chat
      model on human benchmarks. Both the base and instruct models are
      released under the Apache 2.0 license.
  - arxiv_id: "2501.12948"
    title: "DeepSeek-R1 incentivizes reasoning in LLMs through reinforcement learning"
    category: architecture
    authors: ["DeepSeek-AI", "Daya Guo", "Dejian Yang", "Haowei Zhang", "Jun-Mei Song", "Ruoyu Zhang", "R. Xu", "Qihao Zhu", "Shirong Ma", "Peiyi Wang", "Xiaoling Bi", "Xiaokang Zhang", "Xingkai Yu", "Yu Wu", "Z. F. Wu", "Zhibin Gou", "Zhihong Shao", "Zhuoshu Li", "Ziyi Gao", "A. Liu", "Bing Xue", "Bing-Li Wang", "Bochao Wu", "B. Feng", "Chengda Lu", "Chenggang Zhao", "C. Deng", "Chenyu Zhang", "C. Ruan", "Damai Dai", "Deli Chen", "Dong-Li Ji", "Erhang Li", "Fangyun Lin", "Fucong Dai", "Fuli Luo", "Guangbo Hao", "Guanting Chen", "Guowei Li", "H. Zhang", "Han Bao", "Hanwei Xu", "Haocheng Wang", "Honghui Ding", "Huajian Xin", "Huazuo Gao", "Hui Qu", "Hui Li", "Jianzhong Guo", "Jiashi Li", "Jiawei Wang", "JingChang Chen", "Jingyang Yuan", "Junjie Qiu", "Junlong Li", "J. Cai", "J. Ni", "Jian Liang", "Jin Chen", "Kai Dong", "Kai Hu", "Kaige Gao", "Kang Guan", "Kexin Huang", "K. Yu", "Lean Wang", "Lecong Zhang", "Liang Zhao", "Litong Wang", "Liyue Zhang", "Lei Xu", "Leyi Xia", "Mingchuan Zhang", "Minghua Zhang", "M. Tang", "Meng Li", "Miaojun Wang", "Mingming Li", "Ning Tian", "Panpan Huang", "Peng Zhang", "Qiancheng Wang", "Qinyu Chen", "Qiushi Du", "Ruiqi Ge", "Ruisong Zhang", "Ruizhe Pan", "Runji Wang", "R. J. Chen", "R. Jin", "Ruyi Chen", "Shanghao Lu", "Shangyan Zhou", "Shanhuang Chen", "Shengfeng Ye", "Shiyu Wang", "Shuiping Yu", "Shunfeng Zhou", "Shuting Pan", "S. Li", "Shuang Zhou", "Shao-Kang Wu", "Tao Yun", "Tian Pei", "T. Sun", "T. Wang", "Wangding Zeng", "Wanjia Zhao", "Wen Liu", "W. Liang", "Wenjun Gao", "Wen-Xia Yu", "Wentao Zhang", "W. Xiao", "Wei An", "Xiaodong Liu", "Xiaohan Wang", "Xiaokang Chen", "X. Nie", "Xin Cheng", "Xin Liu", "Xin Xie", "Xingchao Liu", "Xinyu Yang", "Xinyuan Li", "Xuecheng Su", "Xuheng Lin", "X. Q. Li", "Xiangyu Jin", "Xi-Cheng Shen", "Xiaosha Chen", "Xiaowen Sun", "Xiaoxiang Wang", "Xinnan Song", "Xinyi Zhou", "Xianzu Wang", "Xinxia Shan", "Y. K. Li", "Y. Q. Wang", "Y. X. Wei", "Yang Zhang", "Yanhong Xu", "Yao Li", "Yao Zhao", "Yaofeng Sun", "Yaohui Wang", "Yi Yu", "Yichao Zhang", "Yifan Shi", "Yi Xiong", "Ying He", "Y. Piao", "Yisong Wang", "Yixuan Tan", "Yiyang Ma", "Yiyuan Liu", "Yongqiang Guo", "Y. Ou", "Yuduan Wang", "Yue Gong", "Yu-Jing Zou", "Yujia He", "Yunfan Xiong", "Yu-Wei Luo", "Yu-mei You", "Yuxuan Liu", "Yuyang Zhou", "Y. X. Zhu", "Yanping Huang", "Yao Li", "Yi Zheng", "Yuchen Zhu", "Yunxiang Ma", "Ying Tang", "Y. Zha", "Yuting Yan", "Z. Ren", "Z. Ren", "Zhangli Sha", "Zhe Fu", "Zhean Xu", "Zhenda Xie", "Zhen-guo Zhang", "Zhewen Hao", "Zhicheng Ma", "Zhigang Yan", "Zhiyu Wu", "Zihui Gu", "Zijia Zhu", "Zijun Liu", "Zi-An Li", "Ziwei Xie", "Ziyang Song", "Zizheng Pan", "Zhen Huang", "Zhipeng Xu", "Zhongyu Zhang", "Zhen Zhang"]
    date: "2025-01-22"
    abstract: >-
      General reasoning represents a long-standing and formidable challenge in
      artificial intelligence (AI). Recent breakthroughs, exemplified by large
      language models (LLMs)1,2 and chain-of-thought (CoT) prompting3, have
      achieved considerable success on foundational reasoning tasks. However,
      this success is heavily contingent on extensive human-annotated
      demonstrations and the capabilities of models are still insufficient for
      more complex problems. Here we show that the reasoning abilities of LLMs
      can be incentivized through pure reinforcement learning (RL), obviating
      the need for human-labelled reasoning trajectories. The proposed RL
      framework facilitates the emergent development of advanced reasoning
      patterns, such as self-reflection, verification and dynamic strategy
      adaptation. Consequently, the trained model achieves superior
      performance on verifiable tasks such as mathematics, coding competitions
      and STEM fields, surpassing its counterparts trained through
      conventional supervised learning on human demonstrations. Moreover, the
      emergent reasoning patterns exhibited by these large-scale models can be
      systematically used to guide and enhance the reasoning capabilities of
      smaller models. A new artificial intelligence model, DeepSeek-R1, is
      introduced, demonstrating that the reasoning abilities of large language
      models can be incentivized through pure reinforcement learning, removing
      the need for human-annotated demonstrations.
  - arxiv_id: "2502.13923"
    title: "Qwen2.5-VL Technical Report"
    category: architecture
    authors: ["Shuai Bai", "Keqin Chen", "Xuejing Liu", "Jialin Wang", "Wenbin Ge", "Sibo Song", "Kai Dang", "Peng Wang", "Shijie Wang", "Jun Tang", "Humen Zhong", "Yuanzhi Zhu", "Mingkun Yang", "Zhaohai Li", "Jianqiang Wan", "Pengfei Wang", "Wei Ding", "Zheren Fu", "Yiheng Xu", "Jiabo Ye", "Xi Zhang", "Tianbao Xie", "Zesen Cheng", "Hang Zhang", "Zhibo Yang", "Haiyang Xu", "Junyang Lin"]
    date: "2025-02-19"
    abstract: >-
      We introduce Qwen2.5-VL, the latest flagship model of Qwen
      vision-language series, which demonstrates significant advancements in
      both foundational capabilities and innovative functionalities.
      Qwen2.5-VL achieves a major leap forward in understanding and
      interacting with the world through enhanced visual recognition, precise
      object localization, robust document parsing, and long-video
      comprehension. A standout feature of Qwen2.5-VL is its ability to
      localize objects using bounding boxes or points accurately. It provides
      robust structured data extraction from invoices, forms, and tables, as
      well as detailed analysis of charts, diagrams, and layouts. To handle
      complex inputs, Qwen2.5-VL introduces dynamic resolution processing and
      absolute time encoding, enabling it to process images of varying sizes
      and videos of extended durations (up to hours) with second-level event
      localization. This allows the model to natively perceive spatial scales
      and temporal dynamics without relying on traditional normalization
      techniques. By training a native dynamic-resolution Vision Transformer
      (ViT) from scratch and incorporating Window Attention, we reduce
      computational overhead while maintaining native resolution. As a result,
      Qwen2.5-VL excels not only in static image and document understanding
      but also as an interactive visual agent capable of reasoning, tool
      usage, and task execution in real-world scenarios such as operating
      computers and mobile devices. Qwen2.5-VL is available in three sizes,
      addressing diverse use cases from edge AI to high-performance computing.
      The flagship Qwen2.5-VL-72B model matches state-of-the-art models like
      GPT-4o and Claude 3.5 Sonnet, particularly excelling in document and
      diagram understanding. Additionally, Qwen2.5-VL maintains robust
      linguistic performance, preserving the core language competencies of the
      Qwen2.5 LLM.
  - arxiv_id: "2203.02155"
    title: "Training language models to follow instructions with human feedback"
    category: training
    authors: ["Long Ouyang", "Jeff Wu", "Xu Jiang", "Diogo Almeida", "Carroll L. Wainwright", "Pamela Mishkin", "Chong Zhang", "S. Agarwal", "Katarina Slama", "Alex Ray", "John Schulman", "Jacob Hilton", "Fraser Kelton", "Luke E. Miller", "M. Simens", "Amanda Askell", "Peter Welinder", "P. Christiano", "Jan Leike", "Ryan J. Lowe"]
    date: "2022-03-04"
    abstract: >-
      Making language models bigger does not inherently make them better at
      following a user's intent. For example, large language models can
      generate outputs that are untruthful, toxic, or simply not helpful to
      the user. In other words, these models are not aligned with their users.
      In this paper, we show an avenue for aligning language models with user
      intent on a wide range of tasks by fine-tuning with human feedback.
      Starting with a set of labeler-written prompts and prompts submitted
      through the OpenAI API, we collect a dataset of labeler demonstrations
      of the desired model behavior, which we use to fine-tune GPT-3 using
      supervised learning. We then collect a dataset of rankings of model
      outputs, which we use to further fine-tune this supervised model using
      reinforcement learning from human feedback. We call the resulting models
      InstructGPT. In human evaluations on our prompt distribution, outputs
      from the 1.3B parameter InstructGPT model are preferred to outputs from
      the 175B GPT-3, despite having 100x fewer parameters. Moreover,
      InstructGPT models show improvements in truthfulness and reductions in
      toxic output generation while having minimal performance regressions on
      public NLP datasets. Even though InstructGPT still makes simple
      mistakes, our results show that fine-tuning with human feedback is a
      promising direction for aligning language models with human intent.
  - arxiv_id: "2305.18290"
    title: "Direct Preference Optimization: Your Language Model is Secretly a Reward Model"
    category: training
    authors: ["Rafael Rafailov", "Archit Sharma", "E. Mitchell", "Stefano Ermon", "Christopher D. Manning", "Chelsea Finn"]
    date: "2023-05-29"
    abstract: >-
      While large-scale unsupervised language models (LMs) learn broad world
      knowledge and some reasoning skills, achieving precise control of their
      behavior is difficult due to the completely unsupervised nature of their
      training. Existing methods for gaining such steerability collect human
      labels of the relative quality of model generations and fine-tune the
      unsupervised LM to align with these preferences, often with
      reinforcement learning from human feedback (RLHF). However, RLHF is a
      complex and often unstable procedure, first fitting a reward model that
      reflects the human preferences, and then fine-tuning the large
      unsupervised LM using reinforcement learning to maximize this estimated
      reward without drifting too far from the original model. In this paper
      we introduce a new parameterization of the reward model in RLHF that
      enables extraction of the corresponding optimal policy in closed form,
      allowing us to solve the standard RLHF problem with only a simple
      classification loss. The resulting algorithm, which we call Direct
      Preference Optimization (DPO), is stable, performant, and
      computationally lightweight, eliminating the need for sampling from the
      LM during fine-tuning or performing significant hyperparameter tuning.
      Our experiments show that DPO can fine-tune LMs to align with human
      preferences as well as or better than existing methods. Notably,
      fine-tuning with DPO exceeds PPO-based RLHF in ability to control
      sentiment of generations, and matches or improves response quality in
      summarization and single-turn dialogue while being substantially simpler
      to implement and train.
  - arxiv_id: "2402.03300"
    title: "DeepSeekMath: Pushing the Limits of Mathematical Reasoning in Open Language Models"
    category: training
    authors: ["Zhihong Shao", "Peiyi Wang", "Qihao Zhu", "R. Xu", "Jun-Mei Song", "Mingchuan Zhang", "Y. K. Li", "Yu Wu", "Daya Guo"]
    date: "2024-02-05"
    abstract: >-
      Mathematical reasoning poses a significant challenge for language models
      due to its complex and structured nature. In this paper, we introduce
      DeepSeekMath 7B, which continues pre-training DeepSeek-Coder-Base-v1.5
      7B with 120B math-related tokens sourced from Common Crawl, together
      with natural language and code data. DeepSeekMath 7B has achieved an
      impressive score of 51.7% on the competition-level MATH benchmark
      without relying on external toolkits and voting techniques, approaching
      the performance level of Gemini-Ultra and GPT-4. Self-consistency over
      64 samples from DeepSeekMath 7B achieves 60.9% on MATH. The mathematical
      reasoning capability of DeepSeekMath is attributed to two key factors:
      First, we harness the significant potential of publicly available web
      data through a meticulously engineered data selection pipeline. Second,
      we introduce Group Relative Policy Optimization (GRPO), a variant of
      Proximal Policy Optimization (PPO), that enhances mathematical reasoning
      abilities while concurrently optimizing the memory usage of PPO.
  - arxiv_id: "2402.13228"
    title: "Smaug: Fixing Failure Modes of Preference Optimisation with DPO-Positive"
    category: training
    authors: ["Arka Pal", "Deep Karkhanis", "Samuel Dooley", "Manley Roberts", "Siddartha Naidu", "Colin White"]
    date: "2024-02-20"
    abstract: >-
      Direct Preference Optimisation (DPO) is effective at significantly
      improving the performance of large language models (LLMs) on downstream
      tasks such as reasoning, summarisation, and alignment. Using pairs of
      preferred and dispreferred data, DPO models the relative probability of
      picking one response over another. In this work, first we show
      theoretically that the standard DPO loss can lead to a reduction of the
      model's likelihood of the preferred examples, as long as the relative
      probability between the preferred and dispreferred classes increases. We
      then show empirically that this phenomenon occurs when fine-tuning LLMs
      on common datasets, especially datasets in which the edit distance
      between pairs of completions is low. Using these insights, we design
      DPO-Positive (DPOP), a new loss function and training procedure which
      avoids this failure mode. Surprisingly, we find that DPOP outperforms
      DPO and other fine-tuning procedures across a wide variety of datasets
      and downstream tasks, including datasets with high edit distances
      between completions. Furthermore, we find that the DPOP-tuned model
      outperforms the DPO-tuned model (all else equal) on benchmarks
      independent of the fine-tuning data, such as MT-Bench. Finally, using
      DPOP, we create and open-source Smaug-34B and Smaug-72B, with the latter
      becoming the first open-source LLM to surpass an average accuracy of 80%
      on the HuggingFace Open LLM Leaderboard.
  - arxiv_id: "2001.08361"
    title: "Scaling Laws for Neural Language Models"
    category: training
    authors: ["J. Kaplan", "Sam McCandlish", "T. Henighan", "Tom B. Brown", "Benjamin Chess", "R. Child", "Scott Gray", "Alec Radford", "Jeff Wu", "Dario Amodei"]
    date: "2020-01-23"
    abstract: >-
      We study empirical scaling laws for language model performance on the
      cross-entropy loss. The loss scales as a power-law with model size,
      dataset size, and the amount of compute used for training, with some
      trends spanning more than seven orders of magnitude. Other architectural
      details such as network width or depth have minimal effects within a
      wide range. Simple equations govern the dependence of overfitting on
      model/dataset size and the dependence of training speed on model size.
      These relationships allow us to determine the optimal allocation of a
      fixed compute budget. Larger models are significantly more
      sample-efficient, such that optimally compute-efficient training
      involves training very large models on a relatively modest amount of
      data and stopping significantly before convergence.
  - arxiv_id: "2203.15556"
    title: "Training Compute-Optimal Large Language Models"
    category: training
    authors: ["Jordan Hoffmann", "Sebastian Borgeaud", "Arthur Mensch", "Elena Buchatskaya", "Trevor Cai", "Eliza Rutherford", "Diego de Las Casas", "Lisa Anne Hendricks", "Johannes Welbl", "Aidan Clark", "T. Hennigan", "Eric Noland", "Katie Millican", "George van den Driessche", "Bogdan Damoc", "Aurelia Guy", "Simon Osindero", "K. Simonyan", "Erich Elsen", "Jack W. Rae", "O. Vinyals", "L. Sifre"]
    date: "2022-03-29"
    abstract: >-
      We investigate the optimal model size and number of tokens for training
      a transformer language model under a given compute budget. We find that
      current large language models are significantly undertrained, a
      consequence of the recent focus on scaling language models whilst
      keeping the amount of training data constant. By training over 400
      language models ranging from 70 million to over 16 billion parameters on
      5 to 500 billion tokens, we find that for compute-optimal training, the
      model size and the number of training tokens should be scaled equally:
      for every doubling of model size the number of training tokens should
      also be doubled. We test this hypothesis by training a predicted
      compute-optimal model, Chinchilla, that uses the same compute budget as
      Gopher but with 70B parameters and 4$\times$ more more data. Chinchilla
      uniformly and significantly outperforms Gopher (280B), GPT-3 (175B),
      Jurassic-1 (178B), and Megatron-Turing NLG (530B) on a large range of
      downstream evaluation tasks. This also means that Chinchilla uses
      substantially less compute for fine-tuning and inference, greatly
      facilitating downstream usage. As a highlight, Chinchilla reaches a
      state-of-the-art average accuracy of 67.5% on the MMLU benchmark,
      greater than a 7% improvement over Gopher.
  - arxiv_id: "2204.05862"
    title: "Training a Helpful and Harmless Assistant with Reinforcement Learning from Human Feedback"
    category: training
    authors: ["Yuntao Bai", "Andy Jones", "Kamal Ndousse", "Amanda Askell", "Anna Chen", "Nova Dassarma", "Dawn Drain", "Stanislav Fort", "Deep Ganguli", "T. Henighan", "Nicholas Joseph", "Saurav Kadavath", "John Kernion", "Tom Conerly", "S. El-Showk", "Nelson Elhage", "Zac Hatfield-Dodds", "Danny Hernandez", "Tristan Hume", "Scott Johnston", "Shauna Kravec", "Liane Lovitt", "Neel Nanda", "Catherine Olsson", "Dario Amodei", "Tom B. Brown", "Jack Clark", "Sam McCandlish", "Chris Olah", "Benjamin Mann", "Jared Kaplan"]
    date: "2022-04-12"
    abstract: >-
      We apply preference modeling and reinforcement learning from human
      feedback (RLHF) to ﬁnetune language models to act as helpful and
      harmless assistants. We ﬁnd this alignment training improves performance
      on almost all NLP evaluations, and is fully compatible with training for
      specialized skills such as python coding and summarization. We explore
      an iterated online mode of training, where preference models and RL
      policies are updated on a weekly cadence with fresh human feedback data,
      efﬁciently improving our datasets and models. Finally, we investigate
      the robustness of RLHF training, and identify a roughly linear relation
      between the RL reward and the square root of the KL divergence between
      the policy and its initialization. Alongside our main results, we
      perform peripheral analyses on calibration, competing objectives, and
      the use of OOD detection, compare our models with human writers, and
      provide samples from our models using prompts appearing in recent
      related work. Figure These plots show that PM accuracy decreases as we
      focus exclusively on comparisons between pairs of samples with high
      score. We have normalized all preference models to have the same mean
      score on a held-out dataset so that they’re directly comparable, and
      then plotted accuracy for the comparisons where both samples have scores
      above a speciﬁc threshold.
  - arxiv_id: "2212.08073"
    title: "Constitutional AI: Harmlessness from AI Feedback"
    category: training
    authors: ["Yuntao Bai", "Saurav Kadavath", "Sandipan Kundu", "Amanda Askell", "John Kernion", "Andy Jones", "A. Chen", "Anna Goldie", "Azalia Mirhoseini", "C. McKinnon", "Carol Chen", "Catherine Olsson", "Chris Olah", "Danny Hernandez", "Dawn Drain", "Deep Ganguli", "Dustin Li", "Eli Tran-Johnson", "E. Perez", "Jamie Kerr", "J. Mueller", "Jeffrey Ladish", "J. Landau", "Kamal Ndousse", "Kamil\u0117 Luko\u0161i\u016bt\u0117", "Liane Lovitt", "M. Sellitto", "Nelson Elhage", "Nicholas Schiefer", "Noem'i Mercado", "Nova Dassarma", "R. Lasenby", "Robin Larson", "Sam Ringer", "Scott Johnston", "Shauna Kravec", "S. E. Showk", "Stanislav Fort", "Tamera Lanham", "Timothy Telleen-Lawton", "Tom Conerly", "T. Henighan", "Tristan Hume", "Sam Bowman", "Zac Hatfield-Dodds", "Benjamin Mann", "Dario Amodei", "Nicholas Joseph", "Sam McCandlish", "Tom B. Brown", "Jared Kaplan"]
    date: "2022-12-15"
    abstract: >-
      As AI systems become more capable, we would like to enlist their help to
      supervise other AIs. We experiment with methods for training a harmless
      AI assistant through self-improvement, without any human labels
      identifying harmful outputs. The only human oversight is provided
      through a list of rules or principles, and so we refer to the method as
      'Constitutional AI'. The process involves both a supervised learning and
      a reinforcement learning phase. In the supervised phase we sample from
      an initial model, then generate self-critiques and revisions, and then
      finetune the original model on revised responses. In the RL phase, we
      sample from the finetuned model, use a model to evaluate which of the
      two samples is better, and then train a preference model from this
      dataset of AI preferences. We then train with RL using the preference
      model as the reward signal, i.e. we use 'RL from AI Feedback' (RLAIF).
      As a result we are able to train a harmless but non-evasive AI assistant
      that engages with harmful queries by explaining its objections to them.
      Both the SL and RL methods can leverage chain-of-thought style reasoning
      to improve the human-judged performance and transparency of AI decision
      making. These methods make it possible to control AI behavior more
      precisely and with far fewer human labels.
  - arxiv_id: "2106.09685"
    title: "LoRA: Low-Rank Adaptation of Large Language Models"
    category: efficiency
    authors: ["J. Hu", "Yelong Shen", "Phillip Wallis", "Zeyuan Allen-Zhu", "Yuanzhi Li", "Shean Wang", "Weizhu Chen"]
    date: "2021-06-17"
    abstract: >-
      An important paradigm of natural language processing consists of
      large-scale pre-training on general domain data and adaptation to
      particular tasks or domains. As we pre-train larger models, full
      fine-tuning, which retrains all model parameters, becomes less feasible.
      Using GPT-3 175B as an example -- deploying independent instances of
      fine-tuned models, each with 175B parameters, is prohibitively
      expensive. We propose Low-Rank Adaptation, or LoRA, which freezes the
      pre-trained model weights and injects trainable rank decomposition
      matrices into each layer of the Transformer architecture, greatly
      reducing the number of trainable parameters for downstream tasks.
      Compared to GPT-3 175B fine-tuned with Adam, LoRA can reduce the number
      of trainable parameters by 10,000 times and the GPU memory requirement
      by 3 times. LoRA performs on-par or better than fine-tuning in model
      quality on RoBERTa, DeBERTa, GPT-2, and GPT-3, despite having fewer
      trainable parameters, a higher training throughput, and, unlike
      adapters, no additional inference latency. We also provide an empirical
      investigation into rank-deficiency in language model adaptation, which
      sheds light on the efficacy of LoRA. We release a package that
      facilitates the integration of LoRA with PyTorch models and provide our
      implementations and model checkpoints for RoBERTa, DeBERTa, and GPT-2 at
      https://github.com/microsoft/LoRA.
  - arxiv_id: "2305.14314"
    title: "QLoRA: Efficient Finetuning of Quantized LLMs"
    category: efficiency
    authors: ["Tim Dettmers", "Artidoro Pagnoni", "Ari Holtzman", "Luke Zettlemoyer"]
    date: "2023-05-23"
    abstract: >-
      We present QLoRA, an efficient finetuning approach that reduces memory
      usage enough to finetune a 65B parameter model on a single 48GB GPU
      while preserving full 16-bit finetuning task performance. QLoRA
      backpropagates gradients through a frozen, 4-bit quantized pretrained
      language model into Low Rank Adapters~(LoRA). Our best model family,
      which we name Guanaco, outperforms all previous openly released models
      on the Vicuna benchmark, reaching 99.3% of the performance level of
      ChatGPT while only requiring 24 hours of finetuning on a single GPU.
      QLoRA introduces a number of innovations to save memory without
      sacrificing performance: (a) 4-bit NormalFloat (NF4), a new data type
      that is information theoretically optimal for normally distributed
      weights (b) double quantization to reduce the average memory footprint
      by quantizing the quantization constants, and (c) paged optimziers to
      manage memory spikes. We use QLoRA to finetune more than 1,000 models,
      providing a detailed analysis of instruction following and chatbot
      performance across 8 instruction datasets, multiple model types (LLaMA,
      T5), and model scales that would be infeasible to run with regular
      finetuning (e.g. 33B and 65B parameter models). Our results show that
      QLoRA finetuning on a small high-quality dataset leads to
      state-of-the-art results, even when using smaller models than the
      previous SoTA. We provide a detailed analysis of chatbot performance
      based on both human and GPT-4 evaluations showing that GPT-4 evaluations
      are a cheap and reasonable alternative to human evaluation. Furthermore,
      we find that current chatbot benchmarks are not trustworthy to
      accurately evaluate the performance levels of chatbots. A lemon-picked
      analysis demonstrates where Guanaco fails compared to ChatGPT. We
      release all of our models and code, including CUDA kernels for 4-bit
      training.
  - arxiv_id: "2210.17323"
    title: "GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers"
    category: efficiency
    authors: ["Elias Frantar", "Saleh Ashkboos", "T. Hoefler", "Dan Alistarh"]
    date: "2022-10-31"
    abstract: >-
      Generative Pre-trained Transformer models, known as GPT or OPT, set
      themselves apart through breakthrough performance across complex
      language modelling tasks, but also by their extremely high computational
      and storage costs. Specifically, due to their massive size, even
      inference for large, highly-accurate GPT models may require multiple
      performant GPUs, which limits the usability of such models. While there
      is emerging work on relieving this pressure via model compression, the
      applicability and performance of existing compression techniques is
      limited by the scale and complexity of GPT models. In this paper, we
      address this challenge, and propose GPTQ, a new one-shot weight
      quantization method based on approximate second-order information, that
      is both highly-accurate and highly-efficient. Specifically, GPTQ can
      quantize GPT models with 175 billion parameters in approximately four
      GPU hours, reducing the bitwidth down to 3 or 4 bits per weight, with
      negligible accuracy degradation relative to the uncompressed baseline.
      Our method more than doubles the compression gains relative to
      previously-proposed one-shot quantization methods, preserving accuracy,
      allowing us for the first time to execute an 175 billion-parameter model
      inside a single GPU for generative inference. Moreover, we also show
      that our method can still provide reasonable accuracy in the extreme
      quantization regime, in which weights are quantized to 2-bit or even
      ternary quantization levels. We show experimentally that these
      improvements can be leveraged for end-to-end inference speedups over
      FP16, of around 3.25x when using high-end GPUs (NVIDIA A100) and 4.5x
      when using more cost-effective ones (NVIDIA A6000). The implementation
      is available at https://github.com/IST-DASLab/gptq.
  - arxiv_id: "2306.00978"
    title: "AWQ: Activation-aware Weight Quantization for On-Device LLM Compression and Acceleration"
    category: efficiency
    authors: ["Ji Lin", "Jiaming Tang", "Haotian Tang", "Shang Yang", "Xingyu Dang", "Song Han"]
    date: "2023-06-01"
    abstract: >-
      Large language models (LLMs) have transformed numerous AI applications.
      On-device LLM is becoming increasingly important: running LLMs locally
      on edge devices can reduce cloud computing costs and protect users'
      privacy. However, the astronomical model size and the limited hardware
      resources pose significant deployment challenges. To solve these issues,
      we propose Activation-aware Weight Quantization (AWQ) and TinyChat, an
      algorithm-system full-stack solution for efficient on-device LLM
      deployment. AWQ is a novel quantization method that identifies and
      protects salient weights based on activation distribution, significantly
      reducing model size while preserving performance. TinyChat, an optimized
      inference framework, translates AWQ's theoretical memory savings into
      practical speedups through techniques such as on-the-fly dequantization,
      SIMD-aware weight packing, and kernel fusion. Together, they enable 4x
      model size reduction and 3-4x acceleration across various edge
      platforms, from high-end desktop GPUs to resource-constrained IoT
      devices. This solution democratizes on-device LLM deployment, offering
      privacy-preserving, low-latency AI capabilities across a wide range of
      applications.
  - arxiv_id: "2211.17192"
    title: "Fast Inference from Transformers via Speculative Decoding"
    category: efficiency
    authors: ["Yaniv Leviathan", "Matan Kalman", "Yossi Matias"]
    date: "2022-11-30"
    abstract: >-
      Inference from large autoregressive models like Transformers is slow -
      decoding K tokens takes K serial runs of the model. In this work we
      introduce speculative decoding - an algorithm to sample from
      autoregressive models faster without any changes to the outputs, by
      computing several tokens in parallel. At the heart of our approach lie
      the observations that (1) hard language-modeling tasks often include
      easier subtasks that can be approximated well by more efficient models,
      and (2) using speculative execution and a novel sampling method, we can
      make exact decoding from the large models faster, by running them in
      parallel on the outputs of the approximation models, potentially
      generating several tokens concurrently, and without changing the
      distribution. Our method can accelerate existing off-the-shelf models
      without retraining or architecture changes. We demonstrate it on T5-XXL
      and show a 2X-3X acceleration compared to the standard T5X
      implementation, with identical outputs.
  - arxiv_id: "2309.06180"
    title: "Efficient Memory Management for Large Language Model Serving with PagedAttention"
    category: efficiency
    authors: ["Woosuk Kwon", "Zhuohan Li", "Siyuan Zhuang", "Ying Sheng", "Lianmin Zheng", "Cody Hao Yu", "Joseph E. Gonzalez", "Haotong Zhang", "Ion Stoica"]
    date: "2023-09-12"
    abstract: >-
      High throughput serving of large language models (LLMs) requires
      batching sufficiently many requests at a time. However, existing systems
      struggle because the key-value cache (KV cache) memory for each request
      is huge and grows and shrinks dynamically. When managed inefficiently,
      this memory can be significantly wasted by fragmentation and redundant
      duplication, limiting the batch size. To address this problem, we
      propose PagedAttention, an attention algorithm inspired by the classical
      virtual memory and paging techniques in operating systems. On top of it,
      we build vLLM, an LLM serving system that achieves (1) near-zero waste
      in KV cache memory and (2) flexible sharing of KV cache within and
      across requests to further reduce memory usage. Our evaluations show
      that vLLM improves the throughput of popular LLMs by 2--4× with the same
      level of latency compared to the state-of-the-art systems, such as
      FasterTransformer and Orca. The improvement is more pronounced with
      longer sequences, larger models, and more complex decoding algorithms.
      vLLM's source code is publicly available at
      https://github.com/vllm-project/vllm.
  - arxiv_id: "2402.07616"
    title: "Anchor-based Large Language Models"
    category: efficiency
    authors: ["Jianhui Pang", "Fanghua Ye", "Derek F. Wong", "Longyue Wang"]
    date: "2024-02-12"
    abstract: >-
      Large language models (LLMs) predominantly employ decoder-only
      transformer architectures, necessitating the retention of keys/values
      information for historical tokens to provide contextual information and
      avoid redundant computation. However, the substantial size and parameter
      volume of these LLMs require massive GPU memory. This memory demand
      increases with the length of the input text, leading to an urgent need
      for more efficient methods of information storage and processing. This
      study introduces Anchor-based LLMs (AnLLMs), which utilize an innovative
      anchor-based self-attention network (AnSAN) and also an anchor-based
      inference strategy. This approach enables LLMs to compress sequence
      information into an anchor token, reducing the keys/values cache and
      enhancing inference efficiency. Experiments on question-answering
      benchmarks reveal that AnLLMs maintain similar accuracy levels while
      achieving up to 99% keys/values cache reduction and up to 3.5 times
      faster inference. Despite a minor compromise in accuracy, the
      substantial enhancements of AnLLMs employing the AnSAN technique in
      resource utilization and computational efficiency underscore their
      potential for practical LLM applications.
  - arxiv_id: "2403.03507"
    title: "GaLore: Memory-Efficient LLM Training by Gradient Low-Rank Projection"
    category: efficiency
    authors: ["Jiawei Zhao", "Zhenyu Zhang", "Beidi Chen", "Zhangyang Wang", "Anima Anandkumar", "Yuandong Tian"]
    date: "2024-03-06"
    abstract: >-
      Training Large Language Models (LLMs) presents significant memory
      challenges, predominantly due to the growing size of weights and
      optimizer states. Common memory-reduction approaches, such as low-rank
      adaptation (LoRA), add a low-rank perturbation to the frozen pre-trained
      weight to reduce trainable parameters and optimizer states. However,
      such approaches typically underperform training with full-rank weights
      in both pre-training and fine-tuning stages since they limit the
      parameter search to a low-rank subspace and alter the training dynamics.
      We propose Gradient Low-Rank Projection (GaLore), a training strategy
      that allows full-parameter learning but is more memory-efficient than
      common low-rank adaptation methods.
  - arxiv_id: "2201.11903"
    title: "Chain of Thought Prompting Elicits Reasoning in Large Language Models"
    category: capabilities
    authors: ["Jason Wei", "Xuezhi Wang", "Dale Schuurmans", "Maarten Bosma", "Ed H. Chi", "F. Xia", "Quoc Le", "Denny Zhou"]
    date: "2022-01-28"
    abstract: >-
      We explore how generating a chain of thought -- a series of intermediate
      reasoning steps -- significantly improves the ability of large language
      models to perform complex reasoning. In particular, we show how such
      reasoning abilities emerge naturally in sufficiently large language
      models via a simple method called chain of thought prompting, where a
      few chain of thought demonstrations are provided as exemplars in
      prompting. Experiments on three large language models show that chain of
      thought prompting improves performance on a range of arithmetic,
      commonsense, and symbolic reasoning tasks. The empirical gains can be
      striking. For instance, prompting a 540B-parameter language model with
      just eight chain of thought exemplars achieves state of the art accuracy
      on the GSM8K benchmark of math word problems, surpassing even finetuned
      GPT-3 with a verifier.
  - arxiv_id: "2203.11171"
    title: "Self-Consistency Improves Chain of Thought Reasoning in Language Models"
    category: capabilities
    authors: ["Xuezhi Wang", "Jason Wei", "D. Schuurmans", "Quoc Le", "Ed H. Chi", "Denny Zhou"]
    date: "2022-03-21"
    abstract: >-
      Chain-of-thought prompting combined with pre-trained large language
      models has achieved encouraging results on complex reasoning tasks. In
      this paper, we propose a new decoding strategy, self-consistency, to
      replace the naive greedy decoding used in chain-of-thought prompting. It
      first samples a diverse set of reasoning paths instead of only taking
      the greedy one, and then selects the most consistent answer by
      marginalizing out the sampled reasoning paths. Self-consistency
      leverages the intuition that a complex reasoning problem typically
      admits multiple different ways of thinking leading to its unique correct
      answer. Our extensive empirical evaluation shows that self-consistency
      boosts the performance of chain-of-thought prompting with a striking
      margin on a range of popular arithmetic and commonsense reasoning
      benchmarks, including GSM8K (+17.9%), SVAMP (+11.0%), AQuA (+12.2%),
      StrategyQA (+6.4%) and ARC-challenge (+3.9%).
  - arxiv_id: "2305.10601"
    title: "Tree of Thoughts: Deliberate Problem Solving with Large Language Models"
    category: capabilities
    authors: ["Shunyu Yao", "Dian Yu", "Jeffrey Zhao", "Izhak Shafran", "T. Griffiths", "Yuan Cao", "Karthik Narasimhan"]
    date: "2023-05-17"
    abstract: >-
      Language models are increasingly being deployed for general problem
      solving across a wide range of tasks, but are still confined to
      token-level, left-to-right decision-making processes during inference.
      This means they can fall short in tasks that require exploration,
      strategic lookahead, or where initial decisions play a pivotal role. To
      surmount these challenges, we introduce a new framework for language
      model inference, Tree of Thoughts (ToT), which generalizes over the
      popular Chain of Thought approach to prompting language models, and
      enables exploration over coherent units of text (thoughts) that serve as
      intermediate steps toward problem solving. ToT allows LMs to perform
      deliberate decision making by considering multiple different reasoning
      paths and self-evaluating choices to decide the next course of action,
      as well as looking ahead or backtracking when necessary to make global
      choices. Our experiments show that ToT significantly enhances language
      models' problem-solving abilities on three novel tasks requiring
      non-trivial planning or search: Game of 24, Creative Writing, and Mini
      Crosswords. For instance, in Game of 24, while GPT-4 with
      chain-of-thought prompting only solved 4% of tasks, our method achieved
      a success rate of 74%. Code repo with all prompts:
      https://github.com/princeton-nlp/tree-of-thought-llm.
  - arxiv_id: "2005.11401"
    title: "Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks"
    category: capabilities
    authors: ["Patrick Lewis", "Ethan Perez", "Aleksandara Piktus", "F. Petroni", "Vladimir Karpukhin", "Naman Goyal", "Heinrich Kuttler", "M. Lewis", "Wen-tau Yih", "Tim Rockt\u00e4schel", "Sebastian Riedel", "Douwe Kiela"]
    date: "2020-05-22"
    abstract: >-
      Large pre-trained language models have been shown to store factual
      knowledge in their parameters, and achieve state-of-the-art results when
      fine-tuned on downstream NLP tasks. However, their ability to access and
      precisely manipulate knowledge is still limited, and hence on
      knowledge-intensive tasks, their performance lags behind task-specific
      architectures. Additionally, providing provenance for their decisions
      and updating their world knowledge remain open research problems.
      Pre-trained models with a differentiable access mechanism to explicit
      non-parametric memory can overcome this issue, but have so far been only
      investigated for extractive downstream tasks. We explore a
      general-purpose fine-tuning recipe for retrieval-augmented generation
      (RAG) -- models which combine pre-trained parametric and non-parametric
      memory for language generation. We introduce RAG models where the
      parametric memory is a pre-trained seq2seq model and the non-parametric
      memory is a dense vector index of Wikipedia, accessed with a pre-trained
      neural retriever. We compare two RAG formulations, one which conditions
      on the same retrieved passages across the whole generated sequence, the
      other can use different passages per token. We fine-tune and evaluate
      our models on a wide range of knowledge-intensive NLP tasks and set the
      state-of-the-art on three open domain QA tasks, outperforming parametric
      seq2seq models and task-specific retrieve-and-extract architectures. For
      language generation tasks, we find that RAG models generate more
      specific, diverse and factual language than a state-of-the-art
      parametric-only seq2seq baseline.
  - arxiv_id: "2312.10997"
    title: "Retrieval-Augmented Generation for Large Language Models: A Survey"
    category: capabilities
    authors: ["Yunfan Gao", "Yun Xiong", "Xinyu Gao", "Kangxiang Jia", "Jin Pan", "Yuxi Bi", "Yi Dai", "Jiawei Sun", "Qianyu Guo", "Meng Wang", "Haofen Wang"]
    date: "2023-12-18"
    abstract: >-
      Large Language Models (LLMs) showcase impressive capabilities but
      encounter challenges like hallucination, outdated knowledge, and
      non-transparent, untraceable reasoning processes. Retrieval-Augmented
      Generation (RAG) has emerged as a promising solution by incorporating
      knowledge from external databases. This enhances the accuracy and
      credibility of the generation, particularly for knowledge-intensive
      tasks, and allows for continuous knowledge updates and integration of
      domain-specific information. RAG synergistically merges LLMs' intrinsic
      knowledge with the vast, dynamic repositories of external databases.
      This comprehensive review paper offers a detailed examination of the
      progression of RAG paradigms, encompassing the Naive RAG, the Advanced
      RAG, and the Modular RAG. It meticulously scrutinizes the tripartite
      foundation of RAG frameworks, which includes the retrieval, the
      generation and the augmentation techniques. The paper highlights the
      state-of-the-art technologies embedded in each of these critical
      components, providing a profound understanding of the advancements in
      RAG systems. Furthermore, this paper introduces up-to-date evaluation
      framework and benchmark. At the end, this article delineates the
      challenges currently faced and points out prospective avenues for
      research and development.
