# Curated seed papers for LENS bootstrap.
# Metadata pre-fetched — no arXiv API calls needed during acquisition.
papers:
  - arxiv_id: "1706.03762"
    title: "Attention is All you Need"
    category: foundational
    authors: ["Ashish Vaswani", "Noam Shazeer", "Niki Parmar", "Jakob Uszkoreit", "Llion Jones", "Aidan N. Gomez", "Lukasz Kaiser", "I. Polosukhin"]
    date: "2017-06-12"
    abstract: >-
      The dominant sequence transduction models are based on complex recurrent
      or convolutional neural networks in an encoder-decoder configuration.
      The best performing models also connect the encoder and decoder through
      an attention mechanism. We propose a new simple network architecture,
      the Transformer, based solely on attention mechanisms, dispensing with
      recurrence and convolutions entirely. Experiments on two machine
      translation tasks show these models to be superior in quality while
      being more parallelizable and requiring significantly less time to
      train. Our model achieves 28.4 BLEU on the WMT 2014 English-to-German
      translation task, improving over the existing best results, including
      ensembles by over 2 BLEU. On the WMT 2014 English-to-French translation
      task, our model establishes a new single-model state-of-the-art BLEU
      score of 41.8 after training for 3.5 days on eight GPUs, a small
      fraction of the training costs of the best models from the literature.
      We show that the Transformer generalizes well to other tasks by applying
      it successfully to English constituency parsing both with large and
      limited training data.
  - arxiv_id: "2005.14165"
    title: "Language Models are Few-Shot Learners"
    category: foundational
    authors: ["Tom B. Brown", "Benjamin Mann", "Nick Ryder", "Melanie Subbiah", "J. Kaplan", "Prafulla Dhariwal", "Arvind Neelakantan", "Pranav Shyam", "G. Sastry", "Amanda Askell", "S. Agarwal", "Ariel Herbert-Voss", "Gretchen Krueger", "T. Henighan", "R. Child", "A. Ramesh", "Daniel M. Ziegler", "Jeff Wu", "Clemens Winter", "Christopher Hesse", "Mark Chen", "Eric Sigler", "Ma-teusz Litwin", "Scott Gray", "Benjamin Chess", "Jack Clark", "Christopher Berner", "Sam McCandlish", "Alec Radford", "I. Sutskever", "Dario Amodei"]
    date: "2020-05-28"
    abstract: >-
      Recent work has demonstrated substantial gains on many NLP tasks and
      benchmarks by pre-training on a large corpus of text followed by
      fine-tuning on a specific task. While typically task-agnostic in
      architecture, this method still requires task-specific fine-tuning
      datasets of thousands or tens of thousands of examples. By contrast,
      humans can generally perform a new language task from only a few
      examples or from simple instructions - something which current NLP
      systems still largely struggle to do. Here we show that scaling up
      language models greatly improves task-agnostic, few-shot performance,
      sometimes even reaching competitiveness with prior state-of-the-art
      fine-tuning approaches. Specifically, we train GPT-3, an autoregressive
      language model with 175 billion parameters, 10x more than any previous
      non-sparse language model, and test its performance in the few-shot
      setting. For all tasks, GPT-3 is applied without any gradient updates or
      fine-tuning, with tasks and few-shot demonstrations specified purely via
      text interaction with the model. GPT-3 achieves strong performance on
      many NLP datasets, including translation, question-answering, and cloze
      tasks, as well as several tasks that require on-the-fly reasoning or
      domain adaptation, such as unscrambling words, using a novel word in a
      sentence, or performing 3-digit arithmetic. At the same time, we also
      identify some datasets where GPT-3's few-shot learning still struggles,
      as well as some datasets where GPT-3 faces methodological issues related
      to training on large web corpora. Finally, we find that GPT-3 can
      generate samples of news articles which human evaluators have difficulty
      distinguishing from articles written by humans. We discuss broader
      societal impacts of this finding and of GPT-3 in general.
  - arxiv_id: "2302.13971"
    title: "LLaMA: Open and Efficient Foundation Language Models"
    category: foundational
    authors: ["Hugo Touvron", "Thibaut Lavril", "Gautier Izacard", "X. Martinet", "M. Lachaux", "Timoth\u00e9e Lacroix", "Baptiste Rozi\u00e8re", "Naman Goyal", "Eric Hambro", "Faisal Azhar", "Aur'elien Rodriguez", "Armand Joulin", "Edouard Grave", "Guillaume Lample"]
    date: "2023-02-27"
    abstract: >-
      We introduce LLaMA, a collection of foundation language models ranging
      from 7B to 65B parameters. We train our models on trillions of tokens,
      and show that it is possible to train state-of-the-art models using
      publicly available datasets exclusively, without resorting to
      proprietary and inaccessible datasets. In particular, LLaMA-13B
      outperforms GPT-3 (175B) on most benchmarks, and LLaMA-65B is
      competitive with the best models, Chinchilla-70B and PaLM-540B. We
      release all our models to the research community.
  - arxiv_id: "2307.09288"
    title: "Llama 2: Open Foundation and Fine-Tuned Chat Models"
    category: foundational
    authors: ["Hugo Touvron", "Louis Martin", "Kevin R. Stone", "Peter Albert", "Amjad Almahairi", "Yasmine Babaei", "Niko-lay Bashlykov", "Soumya Batra", "Prajjwal Bhargava", "Shruti Bhosale", "D. Bikel", "Lukas Blecher", "Cristian Canton Ferrer", "Moya Chen", "Guillem Cucurull", "David Esiobu", "Jude Fernandes", "J. Fu", "Wenyin Fu", "Brian Fuller", "Cynthia Gao", "Vedanuj Goswami", "Naman Goyal", "A. Hartshorn", "Saghar Hosseini", "Rui Hou", "Hakan Inan", "Marcin Kardas", "Viktor Kerkez", "Madian Khabsa", "Isabel M. Kloumann", "A. Korenev", "Punit Singh Koura", "M. Lachaux", "Thibaut Lavril", "Jenya Lee", "Diana Liskovich", "Yinghai Lu", "Yuning Mao", "X. Martinet", "Todor Mihaylov", "Pushkar Mishra", "Igor Molybog", "Yixin Nie", "Andrew Poulton", "J. Reizenstein", "Rashi Rungta", "Kalyan Saladi", "A. Schelten", "Ruan Silva", "Eric Michael Smith", "R. Subramanian", "Xia Tan", "Binh Tang", "Ross Taylor", "Adina Williams", "Jian Xiang Kuan", "Puxin Xu", "Zhengxu Yan", "Iliyan Zarov", "Yuchen Zhang", "Angela Fan", "M. Kambadur", "Sharan Narang", "Aur'elien Rodriguez", "Robert Stojnic", "Sergey Edunov", "Thomas Scialom"]
    date: "2023-07-18"
    abstract: >-
      In this work, we develop and release Llama 2, a collection of pretrained
      and fine-tuned large language models (LLMs) ranging in scale from 7
      billion to 70 billion parameters. Our fine-tuned LLMs, called Llama
      2-Chat, are optimized for dialogue use cases. Our models outperform
      open-source chat models on most benchmarks we tested, and based on our
      human evaluations for helpfulness and safety, may be a suitable
      substitute for closed-source models. We provide a detailed description
      of our approach to fine-tuning and safety improvements of Llama 2-Chat
      in order to enable the community to build on our work and contribute to
      the responsible development of LLMs.
