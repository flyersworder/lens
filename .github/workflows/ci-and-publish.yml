name: Python CI and Publish to PyPI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      run_publish:
        description: 'Set to true to run the publish job'
        required: false
        default: 'false'

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev --frozen
      # Deselect integration tests — they hit live external hosts (e.g.
      # data.rag.ac.cn via deepxiv-sdk) and make CI hostage to third-party
      # uptime. Run them locally/on-demand with `uv run pytest -m integration`.
      - run: uv run pytest -m "not integration"

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uvx uv-secure uv.lock

  publish:
    needs: [test, security]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_publish == 'true')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv build --no-sources
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
