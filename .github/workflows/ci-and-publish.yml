name: Python CI and Publish to PyPI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      run_publish:
        description: 'Set to true to run the publish job'
        required: false
        default: 'false'

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.12
      - run: uv sync --all-extras --dev --frozen
      # Deselect integration tests — they hit live external hosts (e.g.
      # data.rag.ac.cn via deepxiv-sdk) and make CI hostage to third-party
      # uptime. Run them locally/on-demand with `uv run pytest -m integration`.
      - run: uv run pytest -m "not integration"

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uvx uv-secure uv.lock

  publish:
    needs: [test, security]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_publish == 'true')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv build --no-sources
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
