[project]
name = "lens"
version = "0.1.0"
description = "LLM Engineering Navigation System — discovers recurring solution patterns from LLM research papers"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "lancedb>=0.17",
    "polars>=1.0",
    "pydantic>=2.0",
    "typer>=0.12",
    "pyyaml>=6.0",
    "litellm>=1.40",
    "rich>=13.0",
]

[project.scripts]
lens = "lens.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: marks tests that hit live APIs (deselect with '-m \"not integration\"')",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]
